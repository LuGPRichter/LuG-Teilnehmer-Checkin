<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teilnehmer Check-In</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-8">

                <div class="card shadow">

                    <div class="card-header bg-primary text-white">

                        <h3 class="mb-0">
                            Teilnehmer Check-In
                        </h3>

                    </div>

                    <div class="card-body">

                        <h5 id="username">
                            Willkommen
                        </h5>

                        <hr>

                        <p>
                            Mit dem Check-In bestätigst du deine Anwesenheit
                            am Schulstandort. Die Erfassung erfolgt ausschließlich
                            innerhalb des erlaubten Zeitfensters und am vorgesehenen Standort.
                        </p>

                        <p>
                            Vor dem Check-In müssen die Nutzungsbedingungen bestätigt werden.
                        </p>

                        <div class="form-check">

                            <input
                                class="form-check-input"
                                type="checkbox"
                                id="agb">

                            <label
                                class="form-check-label"
                                for="agb">

                                Ich akzeptiere die Nutzungsbedingungen.

                            </label>

                        </div>

                        <br>

                        <button
                            class="btn btn-success"
                            onclick="checkIn()">

                            Check-In durchführen

                        </button>

                        <hr>

                        <div id="meldung"></div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Eigene JavaScript-Datei -->
    <script src="app.js"></script>

</body>

</html>
